#############################################
# Wazuh Deployment Configuration
#############################################

# Domain used for Wazuh dashboard
WAZUH_DOMAIN="wazuh.example.com"

# Email used for Let's Encrypt certificate
SSL_EMAIL="admin@example.com"

# Wazuh Docker repository
WAZUH_REPO="https://github.com/wazuh/wazuh-docker.git"

# Wazuh installation directory
WAZUH_INSTALL_DIR="$HOME/wazuh-docker"

# OpenSearch memory configuration
OPENSEARCH_MIN_MEM="2g"
OPENSEARCH_MAX_MEM="2g"

# Nginx configuration path
NGINX_AVAILABLE="/etc/nginx/sites-available/wazuh"
NGINX_ENABLED="/etc/nginx/sites-enabled/wazuh"

# Required ports
PORT_DASHBOARD="443"
PORT_AGENT_LOG="1514"
PORT_AGENT_AUTH="1515"

# Docker compose directory
WAZUH_COMPOSE_DIR="$HOME/wazuh-docker/single-node"